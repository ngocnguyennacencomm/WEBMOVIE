<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VSMOV — Xem Phim Online</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #e63c3c;
    --red-dark: #c42d2d;
    --bg: #08080f;
    --bg2: #10101a;
    --bg3: #18182a;
    --text: #e8e6f0;
    --text2: rgba(232,230,240,0.6);
    --text3: rgba(232,230,240,0.35);
    --border: rgba(255,255,255,0.08);
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'Be Vietnam Pro', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  a { text-decoration: none; color: inherit; }
  button { cursor: pointer; font-family: inherit; }
  img { display: block; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 4px; }

  /* NAVBAR */
  .navbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    display: flex; align-items: center; gap: 12px;
    padding: 12px 24px;
    background: rgba(8,8,15,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 0.5px solid var(--border);
  }
  .logo { font-size: 22px; font-weight: 700; color: var(--red); letter-spacing: -1px; flex-shrink: 0; }
  .logo span { color: #fff; }
  .nav-links { display: flex; gap: 2px; }
  .nav-link {
    background: none; border: none; color: var(--text2);
    font-size: 13px; font-weight: 500; padding: 6px 14px;
    border-radius: 6px; transition: all 0.2s;
  }
  .nav-link:hover { color: #fff; background: rgba(255,255,255,0.08); }
  .nav-link.active { color: #fff; background: rgba(255,255,255,0.1); }
  .search-wrap {
    margin-left: auto; display: flex; align-items: center; gap: 8px;
    background: var(--bg3); border: 0.5px solid var(--border);
    border-radius: 8px; padding: 0 12px; width: 260px;
    transition: border-color 0.2s;
  }
  .search-wrap:focus-within { border-color: rgba(255,255,255,0.25); }
  .search-wrap svg { flex-shrink: 0; opacity: 0.4; }
  .search-wrap input {
    background: none; border: none; outline: none;
    color: #fff; font-size: 13px; width: 100%;
    padding: 9px 0; font-family: inherit;
  }
  .search-wrap input::placeholder { color: var(--text3); }

  /* PAGE WRAPPER */
  .page { padding-top: 60px; min-height: 100vh; }

  /* HERO */
  .hero {
    position: relative; overflow: hidden;
    padding: 40px 24px 36px;
    background: linear-gradient(to bottom, #0d0d1f 0%, var(--bg) 100%);
  }
  .hero::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 60% 40%, rgba(230,60,60,0.08) 0%, transparent 70%);
  }
  .hero-inner { position: relative; z-index: 1; display: flex; gap: 24px; align-items: flex-start; max-width: 900px; }
  .hero-poster {
    flex-shrink: 0; width: 130px; height: 192px;
    border-radius: 10px; overflow: hidden; background: var(--bg3);
  }
  .hero-poster img { width: 100%; height: 100%; object-fit: cover; }
  .hero-body { flex: 1; padding-top: 4px; }
  .hero-badge {
    display: inline-block; background: var(--red);
    color: #fff; font-size: 10px; font-weight: 700;
    padding: 3px 9px; border-radius: 4px; letter-spacing: 0.8px;
    text-transform: uppercase; margin-bottom: 10px;
  }
  .hero-title { font-size: 28px; font-weight: 700; line-height: 1.2; margin-bottom: 8px; }
  .hero-orig { font-size: 13px; color: var(--text2); margin-bottom: 8px; }
  .hero-meta { display: flex; flex-wrap: wrap; gap: 14px; font-size: 12px; color: var(--text2); margin-bottom: 10px; }
  .hero-meta span { display: flex; align-items: center; gap: 5px; }
  .star { color: #facc15; }
  .hero-desc { font-size: 13px; color: var(--text2); line-height: 1.7; max-width: 520px; margin-bottom: 16px;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .hero-btns { display: flex; gap: 8px; }
  .btn-red {
    background: var(--red); color: #fff; border: none;
    padding: 10px 22px; border-radius: 8px;
    font-size: 13px; font-weight: 600;
    display: flex; align-items: center; gap: 7px;
    transition: background 0.2s;
  }
  .btn-red:hover { background: var(--red-dark); }
  .btn-ghost {
    background: rgba(255,255,255,0.1); color: #fff;
    border: 0.5px solid rgba(255,255,255,0.15);
    padding: 10px 18px; border-radius: 8px; font-size: 13px;
    transition: background 0.2s;
  }
  .btn-ghost:hover { background: rgba(255,255,255,0.15); }

  /* SECTION */
  .section { padding: 0 24px 28px; }
  .section-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .section-title { font-size: 16px; font-weight: 600; }
  .section-title span { color: var(--red); }
  .btn-more { background: none; border: none; color: var(--red); font-size: 12px; font-weight: 500; }

  /* GENRE PILLS */
  .pills { display: flex; gap: 6px; flex-wrap: wrap; padding: 0 24px 18px; }
  .pill {
    background: var(--bg3); border: 0.5px solid var(--border);
    color: var(--text2); font-size: 12px; font-weight: 500;
    padding: 6px 14px; border-radius: 20px; transition: all 0.2s;
    white-space: nowrap;
  }
  .pill:hover { color: #fff; border-color: rgba(255,255,255,0.2); }
  .pill.active { background: var(--red); border-color: var(--red); color: #fff; }

  /* MOVIE GRID */
  .movies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(138px, 1fr)); gap: 14px; }
  .movie-card { border-radius: 10px; overflow: hidden; background: var(--bg2); cursor: pointer; transition: transform 0.2s; }
  .movie-card:hover { transform: translateY(-4px); }
  .movie-thumb { width: 100%; aspect-ratio: 2/3; position: relative; overflow: hidden; background: var(--bg3); }
  .movie-thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
  .movie-card:hover .movie-thumb img { transform: scale(1.05); }
  .badge-quality {
    position: absolute; top: 7px; right: 7px;
    background: var(--red); color: #fff;
    font-size: 9px; font-weight: 700;
    padding: 2px 6px; border-radius: 4px; letter-spacing: 0.5px;
  }
  .badge-ep {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
    padding: 20px 8px 7px;
    font-size: 10px; color: rgba(255,255,255,0.85); font-weight: 500;
  }
  .movie-info { padding: 9px 10px 10px; }
  .movie-name { font-size: 12px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
  .movie-sub { font-size: 11px; color: var(--text3); }

  /* SKELETON */
  .skeleton { background: linear-gradient(90deg, var(--bg3) 25%, #1e1e30 50%, var(--bg3) 75%); background-size: 200%; animation: shimmer 1.4s infinite; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .sk-thumb { aspect-ratio: 2/3; border-radius: 10px; }
  .sk-line { height: 10px; border-radius: 5px; margin: 9px 10px 4px; }
  .sk-line-sm { height: 8px; border-radius: 5px; margin: 0 10px 10px; width: 50%; }

  /* ERROR */
  .error-bar {
    margin: 0 24px 16px;
    background: rgba(230,60,60,0.1); border: 0.5px solid rgba(230,60,60,0.25);
    border-radius: 8px; padding: 11px 14px;
    font-size: 12px; color: #f87171; line-height: 1.6;
    display: flex; gap: 8px; align-items: flex-start;
  }
  .error-bar svg { flex-shrink: 0; margin-top: 1px; }

  /* PLAYER OVERLAY */
  #playerOverlay {
    position: fixed; inset: 0; z-index: 300;
    background: var(--bg); display: none; flex-direction: column;
  }
  #playerOverlay.open { display: flex; }
  .player-nav {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 20px; border-bottom: 0.5px solid var(--border);
    flex-shrink: 0;
  }
  .back-btn {
    background: var(--bg3); border: none; color: var(--text);
    width: 34px; height: 34px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .back-btn:hover { background: #222235; }
  .player-film-title { font-size: 15px; font-weight: 600; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .player-body { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
  .video-box {
    background: #000; width: 100%;
    aspect-ratio: 16/9; max-height: 55vh;
    flex-shrink: 0; position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  #videoFrame { width: 100%; height: 100%; border: none; display: none; }
  .video-placeholder { text-align: center; }
  .video-placeholder svg { color: var(--red); margin: 0 auto 10px; }
  .video-placeholder p { font-size: 12px; color: var(--text2); }
  .player-details { padding: 16px 20px 24px; }
  .player-section-title { font-size: 13px; font-weight: 600; margin-bottom: 10px; color: var(--text2); }
  .ep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(52px, 1fr)); gap: 6px; margin-bottom: 20px; }
  .ep-btn {
    background: var(--bg3); border: 0.5px solid var(--border);
    color: var(--text2); font-size: 12px; font-weight: 500;
    padding: 8px 4px; border-radius: 7px; text-align: center;
    transition: all 0.15s;
  }
  .ep-btn:hover { background: #222235; color: #fff; }
  .ep-btn.active { background: var(--red); border-color: var(--red); color: #fff; }
  .server-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
  .server-tab {
    background: var(--bg3); border: 0.5px solid var(--border);
    color: var(--text2); font-size: 12px; padding: 5px 12px;
    border-radius: 6px;
  }
  .server-tab.active { background: rgba(230,60,60,0.2); border-color: rgba(230,60,60,0.4); color: #fff; }

  /* FOOTER */
  .footer { padding: 24px; border-top: 0.5px solid var(--border); text-align: center; font-size: 12px; color: var(--text3); margin-top: 20px; }

  /* EMPTY */
  .empty { text-align: center; padding: 48px 20px; color: var(--text3); font-size: 13px; grid-column: 1/-1; }
  .empty svg { margin: 0 auto 12px; opacity: 0.3; }

  @media (max-width: 600px) {
    .navbar { padding: 10px 14px; }
    .nav-links { display: none; }
    .search-wrap { width: 100%; max-width: 200px; }
    .hero-inner { flex-direction: column; }
    .hero-poster { width: 100px; height: 148px; }
    .hero-title { font-size: 20px; }
    .section, .pills { padding-left: 14px; padding-right: 14px; }
    .movies-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
  }
</style>
</head>
<body>

<nav class="navbar">
  <div class="logo">VS<span>MOV</span></div>
  <div class="nav-links">
    <button class="nav-link active" onclick="setTab('home',this)">Trang chủ</button>
    <button class="nav-link" onclick="setTab('series',this)">Phim bộ</button>
    <button class="nav-link" onclick="setTab('single',this)">Phim lẻ</button>
    <button class="nav-link" onclick="setTab('hoathinh',this)">Hoạt hình</button>
  </div>
  <div class="search-wrap">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Tìm phim..." onkeydown="if(event.key==='Enter')doSearch()"/>
  </div>
</nav>

<div class="page" id="mainPage">
  <div class="hero" id="heroSection" style="display:none">
    <div class="hero-inner" id="heroContent"></div>
  </div>

  <div class="pills" id="pillsRow">
    <button class="pill active" onclick="setGenre('',this)">Tất cả</button>
    <button class="pill" onclick="setGenre('hanh-dong',this)">Hành động</button>
    <button class="pill" onclick="setGenre('tinh-cam',this)">Tình cảm</button>
    <button class="pill" onclick="setGenre('kinh-di',this)">Kinh dị</button>
    <button class="pill" onclick="setGenre('hai-huoc',this)">Hài hước</button>
    <button class="pill" onclick="setGenre('vien-tuong',this)">Viễn tưởng</button>
    <button class="pill" onclick="setGenre('hoat-hinh',this)">Hoạt hình</button>
    <button class="pill" onclick="setGenre('co-trang',this)">Cổ trang</button>
    <button class="pill" onclick="setGenre('tam-ly',this)">Tâm lý</button>
    <button class="pill" onclick="setGenre('vo-thuat',this)">Võ thuật</button>
  </div>

  <div class="section">
    <div class="section-top">
      <div class="section-title" id="sectionTitle">Phim <span>mới cập nhật</span></div>
      <button class="btn-more" onclick="loadMore()">Xem thêm →</button>
    </div>
    <div id="errorBar" class="error-bar" style="display:none;margin:0 0 16px;"></div>
    <div class="movies-grid" id="moviesGrid"></div>
  </div>

  <footer class="footer">VSMOV © 2025 — Dữ liệu từ vsmov.com — Chỉ dùng cá nhân</footer>
</div>

<!-- PLAYER OVERLAY -->
<div id="playerOverlay">
  <div class="player-nav">
    <button class="back-btn" onclick="closePlayer()" aria-label="Quay lại">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </button>
    <div class="player-film-title" id="playerTitle">Đang tải...</div>
  </div>
  <div class="player-body">
    <div class="video-box">
      <iframe id="videoFrame" allowfullscreen allow="autoplay; fullscreen"></iframe>
      <div class="video-placeholder" id="videoPlaceholder">
        <svg width="52" height="52" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon fill="currentColor" stroke="none" points="10,8 16,12 10,16"/></svg>
        <p id="placeholderText">Chọn tập để bắt đầu xem</p>
      </div>
    </div>
    <div class="player-details">
      <div id="serverRow" style="display:none">
        <div class="player-section-title">Chọn server</div>
        <div class="server-tabs" id="serverTabs"></div>
      </div>
      <div class="player-section-title" id="epLabel">Danh sách tập</div>
      <div class="ep-grid" id="epGrid"></div>
    </div>
  </div>
</div>

<script>
// ============================================================
// CONFIG — đổi BASE_URL thành domain Vercel của bạn sau khi deploy
// ============================================================
const BASE_URL = window.location.origin; // tự detect domain
const API = (path) => `${BASE_URL}/api/proxy?path=${encodeURIComponent(path)}`;

// ============================================================
let currentTab = 'home';
let currentGenre = '';
let currentPage = 1;
let currentServers = [];
let activeServer = 0;

// ============================================================
// FETCH HELPER
// ============================================================
async function apiFetch(path) {
  const res = await fetch(API(path), { signal: AbortSignal.timeout(10000) });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// ============================================================
// RENDER SKELETONS
// ============================================================
function showSkeletons(count = 18) {
  document.getElementById('moviesGrid').innerHTML = Array(count).fill(0).map(() => `
    <div>
      <div class="sk-thumb skeleton"></div>
      <div class="sk-line skeleton"></div>
      <div class="sk-line-sm skeleton"></div>
    </div>`).join('');
}

// ============================================================
// LOAD MOVIES
// ============================================================
async function loadMovies(tab = '', genre = '', page = 1) {
  showSkeletons();
  document.getElementById('errorBar').style.display = 'none';
  document.getElementById('heroSection').style.display = 'none';

  let path = `danh-sach/phim-moi-cap-nhat?page=${page}&limit=20`;
if (tab === 'series')    path = `danh-sach?type=series&page=${page}&limit=20`;
if (tab === 'single')    path = `api/api/danh-sach?type=single&page=${page}&limit=20`;
if (tab === 'hoathinh')  path = `api/api/danh-sach?type=hoathinh&page=${page}&limit=20`;
  if (genre) path += `&category=${genre}`;

  try {
    const data = await apiFetch(path);
    const movies = data.items || data.data || data.movies || (Array.isArray(data) ? data : []);
    renderMovies(movies);
    if (movies.length) renderHero(movies[0]);
  } catch (e) {
    showError(e.message);
    renderMovies([]);
  }
}

function renderMovies(movies) {
  const grid = document.getElementById('moviesGrid');
  if (!movies.length) {
    grid.innerHTML = `<div class="empty">
      <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      <p>Không có phim nào</p></div>`;
    return;
  }
  grid.innerHTML = movies.map(m => {
    const thumb = m.thumb_url ? (m.thumb_url.startsWith('http') ? m.thumb_url : 'https://img.ophim.live/uploads/movies/' + m.thumb_url) : (m.poster_url || '');
    const ep    = m.episode_current || '';
    const qual  = m.quality || '';
    const name  = (m.name || m.title || 'Chưa có tên').replace(/"/g, '&quot;');
    const slug  = m.slug || '';
    return `
    <div class="movie-card" onclick="openPlayer('${slug}','${name.replace(/'/g,"\\'")}')">
      <div class="movie-thumb">
        ${thumb ? `<img src="${thumb}" alt="${name}" loading="lazy" onerror="this.style.display='none'"/>` : ''}
        ${qual ? `<div class="badge-quality">${qual}</div>` : ''}
        ${ep   ? `<div class="badge-ep">${ep}</div>` : ''}
      </div>
      <div class="movie-info">
        <div class="movie-name">${m.name || m.title || 'Chưa có tên'}</div>
        <div class="movie-sub">${m.origin_name || ''} ${m.year ? '· '+m.year : ''}</div>
      </div>
    </div>`;
  }).join('');
}

function renderHero(m) {
  if (!m) return;
  const thumb = m.thumb_url || m.poster_url || '';
  const slug  = m.slug || '';
  const name  = (m.name || '').replace(/'/g, "\\'");
  document.getElementById('heroContent').innerHTML = `
    <div class="hero-poster">${thumb ? `<img src="${thumb}" alt="${m.name||''}"/>` : ''}</div>
    <div class="hero-body">
      <div class="hero-badge">Nổi bật hôm nay</div>
      <div class="hero-title">${m.name || ''}</div>
      ${m.origin_name ? `<div class="hero-orig">${m.origin_name}</div>` : ''}
      <div class="hero-meta">
        ${m.year ? `<span><svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>${m.year}</span>` : ''}
        ${m.tmdb?.vote_average ? `<span><svg class="star" width="12" height="12" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>${Number(m.tmdb.vote_average).toFixed(1)}</span>` : ''}
        ${m.quality ? `<span>${m.quality}</span>` : ''}
        ${m.episode_current ? `<span>${m.episode_current}</span>` : ''}
      </div>
      ${m.content ? `<div class="hero-desc">${m.content.replace(/<[^>]+>/g,'')}</div>` : ''}
      <div class="hero-btns">
        <button class="btn-red" onclick="openPlayer('${slug}','${name}')">
          <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
          Xem ngay
        </button>
        <button class="btn-ghost">+ Yêu thích</button>
      </div>
    </div>`;
  document.getElementById('heroSection').style.display = 'block';
}

// ============================================================
// PLAYER
// ============================================================
async function openPlayer(slug, title) {
  if (!slug) return;
  document.getElementById('playerTitle').textContent = title || 'Đang tải...';
  document.getElementById('epGrid').innerHTML = '';
  document.getElementById('serverRow').style.display = 'none';
  document.getElementById('videoFrame').style.display = 'none';
  document.getElementById('videoPlaceholder').style.display = 'flex';
  document.getElementById('videoPlaceholder').style.flexDirection = 'column';
  document.getElementById('videoPlaceholder').style.alignItems = 'center';
  document.getElementById('placeholderText').textContent = 'Đang tải thông tin phim...';
  document.getElementById('playerOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';

  try {
    const data  = await apiFetch(`api/phim/${slug}`);
    const movie = data.movie || data.data || data;
    document.getElementById('playerTitle').textContent = movie.name || title;

    const episodes = movie.episodes || movie.movie?.episodes || [];
    currentServers = episodes;

    if (episodes.length > 1) {
      document.getElementById('serverRow').style.display = 'block';
      document.getElementById('serverTabs').innerHTML = episodes.map((s, i) =>
        `<button class="server-tab${i===0?' active':''}" onclick="switchServer(${i},this)">${s.server_name||'Server '+(i+1)}</button>`
      ).join('');
    }

    renderEpisodes(episodes[0], 0);
  } catch (e) {
    document.getElementById('placeholderText').textContent = `Lỗi: ${e.message}`;
  }
}

function renderEpisodes(serverData, serverIdx) {
  activeServer = serverIdx;
  const episodes = movie.episodes || movie.movie?.episodes || [];
  const grid = document.getElementById('epGrid');

  if (!eps.length) {
    grid.innerHTML = `<button class="ep-btn active" onclick="playEp('','Tập 1',this)">Full</button>`;
    document.getElementById('epLabel').textContent = 'Phim lẻ';
    return;
  }

  document.getElementById('epLabel').textContent = `Danh sách tập (${eps.length} tập)`;
  grid.innerHTML = eps.map((ep, i) =>
    `<button class="ep-btn${i===0?' active':''}" onclick="playEp('${ep.link_embed||ep.link_m3u8||''}','${(ep.name||'Tập '+(i+1)).replace(/'/g,"\\'")}',this)">${ep.name||i+1}</button>`
  ).join('');

  if (eps[0]) {
    const eps = serverData?.server_data || serverData?.items || [];, eps[0].name || 'Tập 1', grid.querySelector('.ep-btn'));
  }
}

function playEp(link, name, btn) {
  document.querySelectorAll('.ep-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  const placeholder = document.getElementById('videoPlaceholder');
  const frame = document.getElementById('videoFrame');
  const box = document.querySelector('.video-box');

  if (!link) {
    placeholder.style.display = 'flex';
    frame.style.display = 'none';
    document.getElementById('placeholderText').textContent = 'Không có link stream cho tập này';
    return;
  }

  placeholder.style.display = 'none';
  frame.style.display = 'none';

  // Xóa video cũ nếu có
  const oldVideo = document.getElementById('hlsVideo');
  if (oldVideo) oldVideo.remove();
  const oldScript = document.getElementById('hlsScript');

  // Tạo video element
  const video = document.createElement('video');
  video.id = 'hlsVideo';
  video.controls = true;
  video.autoplay = true;
  video.style.cssText = 'width:100%;height:100%;background:#000;';
  box.appendChild(video);

  const setupHls = () => {
    if (link.includes('.m3u8')) {
      if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(link);
        hls.attachMedia(video);
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = link;
      }
    } else {
      video.src = link;
    }
    video.play().catch(() => {});
  };

  if (window.Hls) {
    setupHls();
  } else if (!oldScript) {
    const s = document.createElement('script');
    s.id = 'hlsScript';
    s.src = 'https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js';
    s.onload = setupHls;
    document.head.appendChild(s);
  }
}

function switchServer(idx, btn) {
  document.querySelectorAll('.server-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (currentServers[idx]) renderEpisodes(currentServers[idx], idx);
}

function closePlayer() {
  document.getElementById('playerOverlay').classList.remove('open');
  document.getElementById('videoFrame').src = '';
  document.getElementById('videoFrame').style.display = 'none';
  document.getElementById('videoPlaceholder').style.display = 'flex';
  document.body.style.overflow = '';
}

// ============================================================
// SEARCH
// ============================================================
async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
  document.getElementById('sectionTitle').innerHTML = `Kết quả: <span>"${q}"</span>`;
  document.getElementById('heroSection').style.display = 'none';
  showSkeletons(12);
  document.getElementById('errorBar').style.display = 'none';

  try {
    const data = await apiFetch(`tim-kiem?keyword=${encodeURIComponent(q)}&limit=20`);
    const movies = data.items || data.data || (Array.isArray(data) ? data : []);
    renderMovies(movies);
  } catch (e) {
    showError(e.message);
    renderMovies([]);
  }
}

// ============================================================
// TABS & FILTERS
// ============================================================
function setTab(tab, el) {
  currentTab = tab; currentGenre = ''; currentPage = 1;
  document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  document.querySelector('.pill').classList.add('active');
  const labels = { home: 'Phim <span>mới cập nhật</span>', series: 'Phim <span>bộ</span>', single: 'Phim <span>lẻ</span>', hoathinh: '<span>Hoạt hình</span>' };
  document.getElementById('sectionTitle').innerHTML = labels[tab] || labels.home;
  loadMovies(tab, '', 1);
}

function setGenre(genre, el) {
  currentGenre = genre; currentPage = 1;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  loadMovies(currentTab, genre, 1);
}

function loadMore() {
  currentPage++;
  loadMovies(currentTab, currentGenre, currentPage);
}

function showError(msg) {
  const bar = document.getElementById('errorBar');
  bar.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg> Lỗi kết nối API: ${msg}. Kiểm tra lại proxy hoặc vsmov.com có hoạt động không.`;
  bar.style.display = 'flex';
}

// ============================================================
// KEYBOARD SHORTCUT: ESC = close player
// ============================================================
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePlayer(); });

// ============================================================
// INIT
// ============================================================
loadMovies();
</script>
